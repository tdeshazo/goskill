name: CI/CD

on:
  pull_request:
    paths-ignore:
      - README.md
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - README.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Format check
        if: runner.os == 'Linux'
        shell: bash
        run: |
          test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build CLI
        shell: bash
        run: |
          MODULE="$(go list -m)"
          go build -trimpath \
            -ldflags "-X ${MODULE}/internal/commands.defaultUpdateRepo=${GITHUB_REPOSITORY}" \
            -o goskill \
            ./cmd/goskill

  wheel:
    name: Wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: go
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build ruff twine

      - name: Ruff check
        run: python -m ruff check setup.py src

      - name: Ruff format check
        run: python -m ruff format --check setup.py src

      - name: Build wheel
        run: python -m build --wheel

      - name: Check wheel metadata
        run: python -m twine check dist/*

      - name: Smoke test wheel
        shell: bash
        run: |
          python -m venv .venv-smoke
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv-smoke/Scripts/python -m pip install dist/*.whl
            .venv-smoke/Scripts/goskill --version
          else
            .venv-smoke/bin/python -m pip install dist/*.whl
            .venv-smoke/bin/goskill --version
          fi

      - name: Upload wheel
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ runner.os }}-${{ runner.arch }}
          path: dist/*.whl
          if-no-files-found: error

  binary:
    name: Binary (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: go
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(awk -F '"' '/^version = / { print $2; exit }' pyproject.toml)"
          fi
          MODULE="$(go list -m)"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -X ${MODULE}/internal/commands.defaultUpdateRepo=${GITHUB_REPOSITORY}" \
              -o "dist/goskill-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
              ./cmd/goskill

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/goskill-*
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [wheel, binary]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --verify-tag \
            --title "$TAG_NAME" \
            --generate-notes

