name: CI/CD

on:
  pull_request:
    paths-ignore:
      - README.md
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - README.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Format check
        if: runner.os == 'Linux'
        shell: bash
        run: |
          test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build CLI
        shell: bash
        run: |
          MODULE="$(go list -m)"
          go build -trimpath \
            -ldflags "-X ${MODULE}/internal/commands.defaultUpdateRepo=${GITHUB_REPOSITORY}" \
            -o goskill \
            ./cmd/goskill

  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff check
        run: python -m ruff check setup.py src

      - name: Ruff format check
        run: python -m ruff format --check setup.py src

  release-linux:
    name: Release artifacts (Linux)
    runs-on: ubuntu-latest
    needs: [go, python]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build Linux binaries
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          MODULE="$(go list -m)"
          for GOARCH in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="${GOARCH}" \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${VERSION} -X ${MODULE}/internal/commands.defaultUpdateRepo=${GITHUB_REPOSITORY}" \
                -o "dist/goskill-linux-${GOARCH}" \
                ./cmd/goskill
          done

      - name: Build Linux wheel
        run: python -m build --wheel

      - name: Check wheel metadata
        run: python -m twine check dist/*.whl

      - name: Smoke test wheel
        shell: bash
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install dist/*.whl
          .venv-smoke/bin/goskill --version

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-linux
          path: dist/*
          if-no-files-found: error

  release-macos:
    name: Release artifacts (macOS)
    runs-on: macos-latest
    needs: [go, python]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build macOS binaries
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          MODULE="$(go list -m)"
          for GOARCH in amd64 arm64; do
            CGO_ENABLED=0 GOOS=darwin GOARCH="${GOARCH}" \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${VERSION} -X ${MODULE}/internal/commands.defaultUpdateRepo=${GITHUB_REPOSITORY}" \
                -o "dist/goskill-darwin-${GOARCH}" \
                ./cmd/goskill
          done

      - name: Build macOS wheel
        run: python -m build --wheel

      - name: Check wheel metadata
        run: python -m twine check dist/*.whl

      - name: Smoke test wheel
        shell: bash
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install dist/*.whl
          .venv-smoke/bin/goskill --version

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-macos
          path: dist/*
          if-no-files-found: error

  release-windows:
    name: Release artifacts (Windows)
    runs-on: windows-latest
    needs: [go, python]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build Windows binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $module = go list -m
          $ldflags = "-s -w -X main.version=$version -X $module/internal/commands.defaultUpdateRepo=$env:GITHUB_REPOSITORY"
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "$ldflags" -o "dist/goskill-windows-amd64.exe" ./cmd/goskill

      - name: Build Windows wheel
        run: python -m build --wheel

      - name: Check wheel metadata
        shell: pwsh
        run: |
          $wheels = Get-ChildItem dist/*.whl
          python -m twine check @($wheels.FullName)

      - name: Smoke test wheel
        shell: pwsh
        run: |
          python -m venv .venv-smoke
          $wheel = (Get-ChildItem dist/*.whl | Select-Object -First 1).FullName
          .venv-smoke/Scripts/python -m pip install $wheel
          .venv-smoke/Scripts/goskill --version

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-windows
          path: dist/*
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [release-linux, release-macos, release-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts-*
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --verify-tag \
            --title "$TAG_NAME" \
            --generate-notes

